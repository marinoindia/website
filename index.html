<style>
#chat-widget-container{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
#chat-window{position:fixed;bottom:90px;left:20px;width:350px;height:500px;background:white;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.2);display:none;flex-direction:column;z-index:99999;overflow:hidden}

.bot-message,.user-message{max-width:80%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bot-message{background:#e5e7eb;color:#1f2937;border-radius:16px 16px 16px 4px;align-self:flex-start}
.user-message{background:#166534;color:white;border-radius:16px 16px 4px 16px;align-self:flex-end}

.quick-replies button:hover{background:#166534;color:white;border-color:#166534}
.chat-input-area{padding:12px 16px;background:white;border-top:1px solid #e5e7eb}
.chat-input-wrapper{display:flex;gap:8px}
#chat-input{flex:1;padding:12px 16px;border:1px solid #d1d5db;border-radius:24px;font-size:14px;outline:none;transition:border-color 0.2s}

.chat-input-wrapper button{background:#166534;color:white;border:none;border-radius:50%;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background 0.2s}

</style>

<script>
const WORKER_URL='https://marino-ai-agent.marinocoindia.workers.dev';
let chatHistory=[],isOpen=!1;
function toggleChat(){const e=document.getElementById('chat-window'),t=document.getElementById('chat-toggle');isOpen=!isOpen,isOpen?(e.style.display='flex',t.style.display='none',document.getElementById('chat-input')?.focus()):(e.style.display='none',t.style.display='block')}
function sendQuick(e){document.getElementById('chat-input').value=e,sendMessage()}
function addMessage(e,t){const n=document.getElementById('chat-messages'),s=document.createElement('div');s.className=t?'user-message':'bot-message',s.textContent=e,n.appendChild(s),n.scrollTop=n.scrollHeight}
function showTyping(){const e=document.getElementById('chat-messages'),t=document.createElement('div');t.id='typing-indicator',t.className='typing-indicator',t.textContent='Typing...',e.appendChild(t),e.scrollTop=e.scrollHeight}
function hideTyping(){document.getElementById('typing-indicator')?.remove()}
async function sendMessage(){const e=document.getElementById('chat-input'),t=e.value.trim();if(!t)return;addMessage(t,!0),e.value='',showTyping();try{const e=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t,history:chatHistory})}),n=await e.json();hideTyping(),addMessage(n.reply,!1),chatHistory.push({role:'user',content:t}),chatHistory.push({role:'assistant',content:n.reply}),chatHistory.length>8&&(chatHistory=chatHistory.slice(-8))}catch(e){hideTyping(),addMessage("Sorry, I'm having trouble connecting. Please call us at +91-9831144669 or try our WhatsApp.",!1)}}
</script>
